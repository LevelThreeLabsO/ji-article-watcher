name: JI article watcher

on:
  # Pinged every ~2 min by cron-job.org via the workflow_dispatch API.
  workflow_dispatch:
  # Laggy best-effort fallback if the pinger ever stops.
  schedule:
    - cron: "*/5 * * * *"

# Needed so poll.py can commit the updated state file back to the repo.
permissions:
  contents: write

# One run at a time. poll.py also re-checks the state per-article, so even if two
# runs overlap they won't post the same article twice.
concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 poll.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JI_BYPASS_TOKEN: ${{ secrets.JI_BYPASS_TOKEN }}

      # Piggyback pings to ji-www-watcher — twice per run (immediate + +60s)
      # so WWW effectively polls every ~1 min. Article-watcher itself fires
      # every ~2 min via cron-job.org.
      # continue-on-error: this job stays green even if the WWW trigger fails.
      # WWW watcher also has its own */5 GitHub cron as fallback.
      - name: Trigger WWW watcher (immediate)
        continue-on-error: true
        timeout-minutes: 1
        env:
          GH_TOKEN: ${{ secrets.WWW_WATCHER_PAT }}
        run: gh workflow run poll.yml -R LevelThreeLabsO/ji-www-watcher --ref main

      - name: Trigger WWW watcher (+60s)
        continue-on-error: true
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.WWW_WATCHER_PAT }}
        run: sleep 60 && gh workflow run poll.yml -R LevelThreeLabsO/ji-www-watcher --ref main
