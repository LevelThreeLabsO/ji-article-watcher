name: JI article watcher

on:
  # Pinged every ~2 min by cron-job.org via the workflow_dispatch API.
  workflow_dispatch:
  # Laggy best-effort fallback if the pinger ever stops.
  schedule:
    - cron: "*/15 * * * *"

# Needed so poll.py can commit the updated state file back to the repo.
permissions:
  contents: write

# One run at a time. poll.py also re-checks the state per-article, so even if two
# runs overlap they won't post the same article twice.
concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 poll.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JI_BYPASS_TOKEN: ${{ secrets.JI_BYPASS_TOKEN }}

      # Piggyback ping to ji-www-watcher so it fires reliably too.
      # continue-on-error: this job stays green even if the WWW trigger fails.
      # WWW watcher also has its own */5 GitHub cron as fallback if this stops firing.
      - name: Trigger WWW watcher
        continue-on-error: true
        timeout-minutes: 1
        env:
          GH_TOKEN: ${{ secrets.WWW_WATCHER_PAT }}
        run: gh workflow run poll.yml -R sruli-hue/ji-www-watcher --ref main
