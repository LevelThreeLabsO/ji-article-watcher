name: JI article watcher

on:
  # Triggered every 5 min by an external pinger (cron-job.org) that calls the
  # workflow_dispatch API. GitHub's own `schedule` cron is too unreliable for
  # 5-min cadence (observed multi-hour gaps), so we don't use it.
  workflow_dispatch:

# Allow the job to commit the updated state file back to the repo.
permissions:
  contents: write

# If a run is still going when the next tick fires, let it finish; don't stack.
concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python poll.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watcher_state.json
          # --cached so this also catches a brand-new (previously untracked) file.
          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "Update watcher state [skip ci]"
            git push
          fi
